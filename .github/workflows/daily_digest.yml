name: Daily Korean News Digest

on:
  schedule:
    # Every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: "0 */4 * * *"
  workflow_dispatch:   # manual trigger from Actions UI

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run digest bot
        env:
          TG_API_ID:          ${{ secrets.TG_API_ID }}
          TG_API_HASH:        ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING:  ${{ secrets.TG_SESSION_STRING }}
          BOT_TOKEN:          ${{ secrets.BOT_TOKEN }}
          TARGET_CHAT_ID:     ${{ secrets.TARGET_CHAT_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          SOURCE_CHANNELS:    ${{ vars.SOURCE_CHANNELS }}
          LOOKBACK_HOURS:     ${{ vars.LOOKBACK_HOURS }}
          MAX_MSGS_PER_CH:    ${{ vars.MAX_MSGS_PER_CH }}
          DIGEST_TITLE:       ${{ vars.DIGEST_TITLE }}
          GEMINI_MODEL:       ${{ vars.GEMINI_MODEL }}
          GEMINI_BATCH_SIZE:  ${{ vars.GEMINI_BATCH_SIZE }}
        run: node main.js
